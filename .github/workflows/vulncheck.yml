# Weekly re-scan: govulncheck consults the live vulnerability database, so
# this catches new advisories against unchanged code. Every PR already runs
# it via make check — this covers the weeks nobody commits.
name: vulncheck

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache-dependency-path: |
            go.sum
            sqlite/go.sum
      - run: make vulncheck
