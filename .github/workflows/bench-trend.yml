# Longitudinal trend on main: results land on gh-pages as a chart, and a
# significant regression (>150% of the previous run) comments on the
# commit. The published performance story, defended over time.
name: bench-trend

on:
  push:
    branches: [main]

permissions:
  # github-action-benchmark pushes the data series to gh-pages.
  contents: write

jobs:
  trend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: |
            go.sum
            sqlite/go.sum
      - name: bench
        run: |
          go test -bench . -benchmem -run '^$' ./... | tee /tmp/bench.txt
          cd sqlite && go test -bench . -benchmem -run '^$' ./... | tee -a /tmp/bench.txt
      - uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: go
          output-file-path: /tmp/bench.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: false
